boundary_id = "BOUNDARY-ScLintCli"
owner_package = "sc-lint"
owner_crate_path = "sc_lint"
name = "ScLintCli"

[public]
facade = "Cli"

[implementation]
type = "Cli"
module = "sc_lint"
visibility = "public"
constructor = "none"

[composition]
# `CommandEnvelope` records the generic success-envelope family documented in
# the CLI contract as `CommandEnvelope<T>`. ADR-009 also locks the current
# observability seam list: `contract::ServiceName`, `logging::ObservedCommand`,
# `logging::dispatch_event`, and the existing `CommandEnvelope.command` field.
roots = ["CheckTarget", "Cli", "ClippyTarget", "Command", "LintTarget", "ViewTarget", "CommandContext", "DispatchTelemetry", "LoadedConfig", "CommandEnvelope", "CliError", "CliErrorKind", "RenderedOutput", "WINDOWS_XWIN_TARGET", "ImmediateOutcome", "ParsedInvocation", "ExecutionOutcome", "consts", "contract::ServiceName", "logging::ObservedCommand", "logging::dispatch_event", "run"]

[dependencies]
# Release 0.1.x permits direct linkage only to the boundary backend crate, the
# shared machine-schema crate, and binary-only support. Other backend execution
# happens through delegated subprocess dispatch behind the CLI contract.
# ADR-009 preserves `sc-observability` as a CLI-only dependency seam even
# though Cargo resolves it at the package level for the mixed lib+bin crate.
allowed_dependents = []
allowed_dependencies = ["sc-lint-boundary", "sc-lint-schema", "sc-observability"]
forbidden_edges = [
  { from = "sc-lint-attributes", to = "sc-lint" },
  { from = "sc-lint-boundary", to = "sc-lint" },
  { from = "sc-lint-boundary", to = "sc-observability" },
  { from = "sc-lint-portability", to = "sc-observability" },
  { from = "sc-lint-runtime", to = "sc-observability" },
  { from = "sc-lint-tokio", to = "sc-observability" },
]

[references]
scope = "outside_owner_crate"
forbidden = []

[testing]
# No test doubles or bypass paths are approved yet because release 0.1.x
# treats the CLI as an integration-first contract surface. Additions here
# require an explicit testability design decision rather than ad hoc mocks.
allowed_test_double_paths = []
forbidden_test_bypasses = []

[enforcement]
lint_rules = ["LINT-SC-CLI-DISPATCH"]
review_gates = ["no_backend_cross_dependencies"]

[status]
state = "concrete_landed"
