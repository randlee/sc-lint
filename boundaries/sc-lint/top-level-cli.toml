boundary_id = "BOUNDARY-ScLintCli"
owner_package = "sc-lint"
owner_crate_path = "sc_lint"
name = "ScLintCli"

[public]
facade = "Cli"

[implementation]
type = "Cli"
module = "sc_lint"
visibility = "public"
constructor = "none"

[composition]
# `CommandEnvelope` records the generic success-envelope family documented in
# the CLI contract as `CommandEnvelope<T>`.
roots = ["CheckTarget", "Cli", "ClippyTarget", "Command", "LintTarget", "ViewTarget", "CommandContext", "DispatchTelemetry", "LoadedConfig", "CommandEnvelope", "CliError", "CliErrorKind", "RenderedOutput", "WINDOWS_XWIN_TARGET", "ImmediateOutcome", "ParsedInvocation", "ExecutionOutcome", "consts", "run"]

[dependencies]
# Release 0.1.x permits direct linkage only to the boundary backend crate, the
# shared machine-schema crate, and binary-only support. Other backend execution
# happens through delegated subprocess dispatch behind the CLI contract.
allowed_dependents = []
allowed_dependencies = ["sc-lint-boundary", "sc-lint-schema", "sc-observability"]
forbidden_edges = [
  "sc-lint-attributes -> sc-lint",
  "sc-lint-boundary -> sc-lint",
]

[references]
scope = "outside_owner_crate"
forbidden = []

[testing]
# No test doubles or bypass paths are approved yet because release 0.1.x
# treats the CLI as an integration-first contract surface. Additions here
# require an explicit testability design decision rather than ad hoc mocks.
allowed_test_double_paths = []
forbidden_test_bypasses = []

[enforcement]
lint_rules = ["LINT-SC-CLI-DISPATCH"]
review_gates = ["no_backend_cross_dependencies"]

[status]
state = "concrete_landed"
