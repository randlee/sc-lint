boundary_id = "BOUNDARY-ScLintPortabilityAnalyzer"
owner_package = "sc-lint-portability"
owner_crate_path = "sc_lint_portability"
name = "ScLintPortabilityAnalyzer"

[public]
facade = "analyze_workspace"

[implementation]
type = "analyze_workspace"
module = "sc_lint_portability"
visibility = "public"
constructor = "none"

[composition]
roots = [
  "AnalyzeOptions",
  "FindingsReport",
  "Finding",
  "RuleId",
  "PortabilityError",
  "analyze_workspace",
  "render_findings_report",
]

[dependencies]
allowed_dependents = []
allowed_dependencies = ["sc-lint-schema"]
forbidden_edges = [
  "sc-lint-portability -> sc-lint-attributes",
  "sc-lint-portability -> sc-lint-boundary",
  "sc-lint-portability -> sc-lint-runtime",
  "sc-lint-portability -> sc-observability",
]

[references]
scope = "outside_owner_crate"
forbidden = []

[testing]
allowed_test_double_paths = []
forbidden_test_bypasses = []

[enforcement]
lint_rules = ["LINT-SC-PORTABILITY-ISOLATION"]
review_gates = ["no_cross_analyzer_dependencies"]

[status]
state = "concrete_landed"
