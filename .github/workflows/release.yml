name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0 or v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_ARTIFACT_MANIFEST: release/publish-artifacts.toml

jobs:
  gate-and-tag:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_version: ${{ steps.meta.outputs.release_version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Normalize version input
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          raw='${{ github.event.inputs.version }}'
          tag="$raw"
          [[ "$tag" == v* ]] || tag="v${tag}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: '$raw' (expected X.Y.Z or vX.Y.Z)" >&2
            exit 1
          fi
          version="${tag#v}"
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Python for release gate
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run release gate
        run: scripts/release_gate.sh origin/main origin/develop '${{ steps.meta.outputs.release_version }}'

      - name: Ensure tag is correct or create it
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ steps.meta.outputs.release_tag }}'
          main_sha="$(git rev-parse origin/main)"
          remote_tag_sha="$(git ls-remote --tags origin "refs/tags/${tag}" | awk '{print $1}' || true)"
          if [[ -n "$remote_tag_sha" ]]; then
            if [[ "$remote_tag_sha" == "$main_sha" ]]; then
              echo "Tag ${tag} already exists and points to origin/main (${main_sha}), skipping creation"
              exit 0
            fi
            echo "Tag ${tag} exists but points to ${remote_tag_sha}, not origin/main (${main_sha})" >&2
            exit 1
          fi
          git tag "$tag" origin/main
          git push origin "$tag"

  prepare-release-inventory:
    needs: gate-and-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.gate-and-tag.outputs.release_tag }}

      - name: Generate release inventory artifact
        shell: bash
        run: |
          set -euo pipefail
          version='${{ needs.gate-and-tag.outputs.release_version }}'
          tag='${{ needs.gate-and-tag.outputs.release_tag }}'
          commit="$(git rev-parse "$tag")"
          generated_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          mkdir -p release
          python3 scripts/release_artifacts.py emit-inventory \
            --manifest "${RELEASE_ARTIFACT_MANIFEST}" \
            --version "$version" \
            --tag "$tag" \
            --commit "$commit" \
            --source-ref "refs/tags/${tag}" \
            --generated-at "$generated_at" \
            --output release/release-inventory.json

      - name: Validate generated release inventory against schema constraints
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          schema_path = Path("docs/release-inventory-schema.json")
          inventory_path = Path("release/release-inventory.json")

          schema = json.loads(schema_path.read_text(encoding="utf-8"))
          inventory = json.loads(inventory_path.read_text(encoding="utf-8"))

          required_top = ["releaseVersion", "releaseTag", "releaseCommit", "generatedAt", "items"]
          for field in required_top:
              if field not in inventory:
                  raise SystemExit(f"inventory missing required top-level field: {field}")

          items = inventory.get("items", [])
          if not isinstance(items, list) or not items:
              raise SystemExit("inventory.items must be a non-empty array")

          required_item = ["artifact", "version", "sourceRef", "publishTarget", "verifyCommands", "required"]
          artifacts = []
          for idx, item in enumerate(items):
              if not isinstance(item, dict):
                  raise SystemExit(f"inventory.items[{idx}] must be an object")
              for field in required_item:
                  if field not in item:
                      raise SystemExit(f"inventory.items[{idx}] missing required field: {field}")
              verify = item["verifyCommands"]
              if not isinstance(verify, list) or not verify:
                  raise SystemExit(f"inventory.items[{idx}].verifyCommands must be non-empty")
              if not isinstance(item["required"], bool):
                  raise SystemExit(f"inventory.items[{idx}].required must be boolean")
              artifacts.append(item["artifact"])
              publish = item.get("publish", True)
              if not isinstance(publish, bool):
                  raise SystemExit(f"inventory.items[{idx}].publish must be boolean when present")
              if not publish:
                  waiver_reason = item.get("waiver_reason")
                  if not isinstance(waiver_reason, str) or not waiver_reason.strip():
                      raise SystemExit(
                          f"inventory.items[{idx}] sets publish=false but waiver_reason is missing/empty"
                      )
              waiver = item.get("waiver")
              if waiver is not None:
                  for wf in ["approver", "reason", "gateCheck"]:
                      if not str(waiver.get(wf, "")).strip():
                          raise SystemExit(
                              f"inventory.items[{idx}].waiver.{wf} must be present and non-empty"
                          )

          if len(artifacts) != len(set(artifacts)):
              raise SystemExit("inventory has duplicate artifact entries")
          if artifacts != sorted(artifacts):
              raise SystemExit("inventory items must be sorted by artifact for deterministic ordering")

          item_required = set(schema["$defs"]["item"]["required"])
          missing = set(required_item) - item_required
          if missing:
              raise SystemExit(
                  f"schema missing required item fields: {', '.join(sorted(missing))}"
              )

          print("release inventory validation passed")
          PY

      - name: Upload release inventory artifact
        uses: actions/upload-artifact@v5
        with:
          name: release-inventory
          path: release/release-inventory.json

  pre-publish-audit:
    needs: [gate-and-tag, prepare-release-inventory]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.gate-and-tag.outputs.release_tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo package audit (core crate) + locked compile check (non-core)
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t full_checks < <(
            python3 scripts/release_artifacts.py list-preflight \
              --manifest "${RELEASE_ARTIFACT_MANIFEST}" \
              --mode full
          )
          for crate in "${full_checks[@]}"; do
            [[ -n "$crate" ]] || continue
            cargo package -p "$crate" --locked
          done

          mapfile -t locked_checks < <(
            python3 scripts/release_artifacts.py list-preflight \
              --manifest "${RELEASE_ARTIFACT_MANIFEST}" \
              --mode locked
          )
          for crate in "${locked_checks[@]}"; do
            [[ -n "$crate" ]] || continue
            cargo check -p "$crate" --locked
          done

  publish-crates:
    needs: [gate-and-tag, prepare-release-inventory, pre-publish-audit]
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.gate-and-tag.outputs.release_tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crates in dependency order (idempotent)
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          version='${{ needs.gate-and-tag.outputs.release_version }}'

          crate_exists() {
            local crate="$1"
            local version="$2"
            cargo search "$crate" --limit 1 | grep -F "${crate} = \"${version}\"" >/dev/null
          }

          publish_if_missing() {
            local crate="$1"
            local wait_seconds="${2:-0}"
            if crate_exists "$crate" "$version"; then
              echo "${crate} ${version} already published; skipping"
              return 0
            fi
            cargo publish -p "$crate" --locked
            if [[ "$wait_seconds" -gt 0 ]]; then
              sleep "$wait_seconds"
            fi
          }

          while IFS='|' read -r crate wait_seconds; do
            [[ -n "$crate" ]] || continue
            publish_if_missing "$crate" "${wait_seconds:-0}"
          done < <(
            python3 scripts/release_artifacts.py list-publish-plan \
              --manifest "${RELEASE_ARTIFACT_MANIFEST}"
          )

  build:
    needs: gate-and-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.gate-and-tag.outputs.release_tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure cross-compilation target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          bin_args="$(python3 scripts/release_artifacts.py cargo-build-bin-args --manifest "${RELEASE_ARTIFACT_MANIFEST}")"
          cargo build --release --target ${{ matrix.target }} ${bin_args}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          VERSION='${{ needs.gate-and-tag.outputs.release_version }}'
          ARCHIVE_PREFIX="$(python3 scripts/release_artifacts.py primary-release-binary --manifest "${RELEASE_ARTIFACT_MANIFEST}")"
          ARCHIVE="${ARCHIVE_PREFIX}_${VERSION}_${{ matrix.target }}.tar.gz"
          STAGING_DIR="${RUNNER_TEMP}/release-${{ matrix.target }}"
          rm -rf "${STAGING_DIR}"
          mkdir -p "${STAGING_DIR}"
          while IFS= read -r binary; do
            [[ -n "${binary}" ]] || continue
            cp "target/${{ matrix.target }}/release/${binary}" "${STAGING_DIR}/${binary}"
          done < <(
            python3 scripts/release_artifacts.py list-release-binaries \
              --manifest "${RELEASE_ARTIFACT_MANIFEST}"
          )
          tar czf "${ARCHIVE}" -C "${STAGING_DIR}" .
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $VERSION = '${{ needs.gate-and-tag.outputs.release_version }}'
          $ARCHIVE_PREFIX = python3 scripts/release_artifacts.py primary-release-binary --manifest "${env:RELEASE_ARTIFACT_MANIFEST}"
          $ARCHIVE = "${ARCHIVE_PREFIX}_${VERSION}_${{ matrix.target }}.zip"
          $STAGING_DIR = Join-Path $env:RUNNER_TEMP "release-${{ matrix.target }}"
          if (Test-Path $STAGING_DIR) {
            Remove-Item -Recurse -Force $STAGING_DIR
          }
          New-Item -ItemType Directory -Path $STAGING_DIR | Out-Null
          $Binaries = python3 scripts/release_artifacts.py list-release-binaries --manifest "${env:RELEASE_ARTIFACT_MANIFEST}"
          foreach ($Binary in $Binaries) {
            if (-not [string]::IsNullOrWhiteSpace($Binary)) {
              Copy-Item "target/${{ matrix.target }}/release/$Binary.exe" -Destination (Join-Path $STAGING_DIR "$Binary.exe")
            }
          }
          Compress-Archive -Path (Join-Path $STAGING_DIR '*') -DestinationPath $ARCHIVE
          echo "ARCHIVE=$ARCHIVE" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    needs: [gate-and-tag, build, publish-crates]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.gate-and-tag.outputs.release_tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Collect archives
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec mv {} release/ \;
          ls -la release/

      - name: Generate checksums
        working-directory: release
        run: |
          # This release job runs on ubuntu-latest, so sha256sum is the expected
          # checksum tool here. If the runner OS changes, update this step.
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.gate-and-tag.outputs.release_tag }}
          generate_release_notes: true
          files: |
            release/*

  update-homebrew:
    needs: [gate-and-tag, release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sc-lint
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.gate-and-tag.outputs.release_tag }}

      - name: Checkout homebrew-tap
        uses: actions/checkout@v5
        with:
          repository: randlee/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Compute release tarball SHA256 values
        id: sha
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ needs.gate-and-tag.outputs.release_tag }}'
          version='${{ needs.gate-and-tag.outputs.release_version }}'
          archive_prefix="$(python3 scripts/release_artifacts.py primary-release-binary --manifest "${RELEASE_ARTIFACT_MANIFEST}")"
          for target in x86_64-apple-darwin aarch64-apple-darwin x86_64-unknown-linux-gnu; do
            tarball_url="https://github.com/randlee/sc-lint/releases/download/${tag}/${archive_prefix}_${version}_${target}.tar.gz"
            tarball_path="${RUNNER_TEMP}/${archive_prefix}_${target}.tar.gz"
            curl -fsSL --retry 5 --retry-delay 30 --retry-all-errors -o "${tarball_path}" "${tarball_url}"
            sha256=$(sha256sum "${tarball_path}" | awk '{print $1}')
            echo "sha256_${target//-/_}=${sha256}" >> "$GITHUB_OUTPUT"
          done
          echo "archive_prefix=${archive_prefix}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Render Homebrew formulas
        shell: bash
        run: |
          set -euo pipefail
          common_args=(
            --manifest "${RELEASE_ARTIFACT_MANIFEST}"
            --version '${{ steps.sha.outputs.version }}'
            --tag '${{ steps.sha.outputs.tag }}'
            --sha256-x86_64-apple-darwin '${{ steps.sha.outputs.sha256_x86_64_apple_darwin }}'
            --sha256-aarch64-apple-darwin '${{ steps.sha.outputs.sha256_aarch64_apple_darwin }}'
            --sha256-x86_64-unknown-linux-gnu '${{ steps.sha.outputs.sha256_x86_64_unknown_linux_gnu }}'
          )
          python3 scripts/release_artifacts.py render-homebrew-formula \
            "${common_args[@]}" \
            --formula sc-lint \
            --output homebrew-tap/Formula/sc-lint.rb
          # Keep the standalone boundary formula in sync as a legacy
          # compatibility surface for existing installs and automation.
          python3 scripts/release_artifacts.py render-homebrew-formula \
            "${common_args[@]}" \
            --formula sc-lint-boundary \
            --output homebrew-tap/Formula/sc-lint-boundary.rb

      - name: Verify formula syntax
        shell: bash
        run: |
          set -euo pipefail
          ruby -c homebrew-tap/Formula/sc-lint.rb
          ruby -c homebrew-tap/Formula/sc-lint-boundary.rb

      - name: Commit and push to homebrew-tap
        shell: bash
        run: |
          set -euo pipefail
          version='${{ steps.sha.outputs.version }}'
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/sc-lint.rb
          git add Formula/sc-lint-boundary.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump sc-lint formulas to v${version}"
          git push
